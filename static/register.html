<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <main>
    <h1 class="header">Messager Ostap</h1>
    <form id="form-register">
        <h4>Логін</h4>
        <input type="text" id="username" name="login" placeholder="Логін" required>
        <h4>Пароль</h4>
        <input type="password" id="password" name="password" placeholder="Пароль" required>
        <h4>Підтвердіть пароль</h4>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Підтвердіть пароль" required>
        <h4>Аватар</h4>
        <button type="button" id="avatar-button" class="avatar-btn">Вибрати аватар</button>
        <div id="avatar-display" class="avatar-preview" style="display: none;">
            <img id="avatar-img" src="" alt="Вибраний аватар">
            <input type="hidden" id="avatar-selected" name="avatar">
        </div>
        <input type="submit" class="submit" value="Register">
    </form>

    <!-- Modal для вибору аватара -->
    <div id="avatar-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Виберіть аватар</h2>
            <div class="avatar-grid">
                <div class="avatar-option" data-avatar="1.png">
                    <img src="avatar/1.png" alt="Avatar 1">
                </div>
                <div class="avatar-option" data-avatar="2.png">
                    <img src="avatar/2.png" alt="Avatar 2">
                </div>
                <div class="avatar-option" data-avatar="3.png">
                    <img src="avatar/3.png" alt="Avatar 3">
                </div>
                <div class="avatar-option" data-avatar="4.png">
                    <img src="avatar/4.png" alt="Avatar 4">
                </div>
                <div class="avatar-option" data-avatar="5.png">
                    <img src="avatar/5.png" alt="Avatar 5">
                </div>
                <div class="avatar-option" data-avatar="6.png">
                    <img src="avatar/6.png" alt="Avatar 6">
                </div>
                <div class="avatar-option" data-avatar="7.png">
                    <img src="avatar/7.png" alt="Avatar 7">
                </div>
                <div class="avatar-option" data-avatar="8.png">
                    <img src="avatar/8.png" alt="Avatar 8">
                </div>
                <div class="avatar-option" data-avatar="9.png">
                    <img src="avatar/9.png" alt="Avatar 9">
                </div>
                <div class="avatar-option" data-avatar="10.png">
                    <img src="avatar/10.png" alt="Avatar 10">
                </div>
            </div>
        </div>
    </div>
    </main>
</body>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js" integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0" crossorigin="anonymous"></script>
    <script src="auth.js"></script>
</html>
